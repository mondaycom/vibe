name: Chromatic

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build-and-upload.yml
    with:
      skip_release_artifacts: true
    secrets:
      npm_token: ${{ secrets.npm_token }}

  publish-chromatic:
    name: Publish Chromatic
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Setup
        uses: ./.github/actions/setup
        with:
          npm_token: ${{ secrets.npm_token }}
      - uses: ./.github/actions/download-builds
        if: ${{ needs.build.outputs.has_changes == 'true' }}
      - name: Publish to Chromatic
        uses: chromaui/action@1cfa065cbdab28f6ca3afaeb3d761383076a35aa  # v11
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/docs
          exitOnceUploaded: true
          onlyChanged: true
          skip: ${{ needs.build.outputs.has_changes == 'false' }}
