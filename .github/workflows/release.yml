name: Release new version

on:
  workflow_dispatch: {}   # Manually triggered from GitHub Actions UI

jobs:
  validate-branch:
    name: Validate Branch
    runs-on: ubuntu-latest
    steps:
      - name: Ensure running on main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Release workflow must be triggered from main branch. Current branch: ${{ github.ref }}"
          exit 1

  notify-release-start:
    name: Notify Slack - Release Started
    needs: validate-branch
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Send Slack notification
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.SLACK_DEV_TEAM_WEBHOOK_URL }}
          method: "POST"
          contentType: "application/json"
          data: |
            {
              "event": "release_started",
              "actor": "${{ github.actor }}",
              "commit_id": "${{ github.sha }}",
              "workflow": "${{ github.workflow }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "commit_url": "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            }

  build:
    name: Build
    needs: validate-branch
    uses: ./.github/workflows/build-and-upload.yml
    secrets:
      npm_token: ${{ secrets.npm_token }}

  test:
    name: Test
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      has_changes: ${{ needs.build.outputs.has_changes }}
    secrets:
      npm_token: ${{ secrets.npm_token }}

  release:
    name: Release
    needs: [build, test]
    if: ${{ needs.build.outputs.has_changes == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Push version bump commit + tags
      packages: write     # Publish to GitHub Packages
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.EZDS_GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Set up Node.js with GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@ezds"
      - name: Run Setup
        uses: ./.github/actions/setup
        with:
          npm_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/git-creds
      - uses: ./.github/actions/download-builds
      - name: Bump versions (Lerna fixed mode)
        run: yarn lerna version --exact --conventional-commits --message "chore(release): publish [skip ci]" -y --create-release github
        env:
          GH_TOKEN: ${{ secrets.EZDS_GITHUB_TOKEN }}
      - name: Publish to GitHub Packages
        run: yarn lerna publish from-package -y
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
